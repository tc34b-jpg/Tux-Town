<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tux Town - Biomes Update</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --ui-blue: #3498db;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #020205;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100%;
        }

        /* --- TELA DE INÍCIO --- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }

        .menu-card {
            background: rgba(20, 20, 20, 0.95);
            padding: 30px; border-radius: 15px;
            border: 2px solid var(--matrix-green);
            box-shadow: 0 0 25px var(--matrix-green);
            width: 350px; text-align: center;
        }

        #game-view { display: none; position: relative; width: 100vw; height: 100vh; }

        /* --- UI OVERLAYS --- */
        .btn-ui {
            position: absolute; background: rgba(0,0,0,0.85);
            border: 2px solid var(--ui-blue); color: var(--ui-blue);
            padding: 10px 20px; cursor: pointer; border-radius: 6px;
            font-weight: bold; font-family: monospace; z-index: 10;
        }
        .btn-ui:hover { background: var(--ui-blue); color: #fff; box-shadow: 0 0 10px var(--ui-blue); }

        #map-btn { bottom: 20px; left: 20px; }
        #options-btn { top: 20px; right: 20px; }

        #options-menu {
            position: absolute; top: 70px; right: 20px;
            background: rgba(0,0,0,0.95); border: 1px solid #444;
            display: none; flex-direction: column; padding: 10px; border-radius: 5px; z-index: 10;
        }

        /* --- POPUP DE PERGUNTAS (TERMINAL) --- */
        #challenge-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #090d16; border: 2px solid var(--ui-blue);
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.5);
            padding: 25px; border-radius: 8px; display: none;
            width: 450px; text-align: center; z-index: 40;
        }

        input, select, button {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 6px; border: 1px solid #333;
            background: #151515; color: #fff; font-family: monospace; box-sizing: border-box;
        }
        #btn-enter { background: var(--matrix-green); color: #000; font-weight: bold; cursor: pointer; border: none; }
        .btn-choice { background: #0f172a; border: 1px solid #1e293b; text-align: left; cursor: pointer; transition: 0.2s; }
        .btn-choice:hover { background: var(--ui-blue); border-color: #fff; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="color: var(--matrix-green); font-size: 3.5em; margin-bottom: 5px; letter-spacing: 2px;">TUX TOWN</h1>
    <p style="color: #888; margin-top: 0; margin-bottom: 25px;">Beta Biomes v2.0</p>
    <div class="menu-card">
        <h3 style="margin-top: 0; color: #fff;">CRIE SEU PINGUIM</h3>
        <input type="text" id="p-name" placeholder="Nome do seu Tux..." maxlength="12" value="TuxHacker">
        
        <label style="font-size: 12px; color: #aaa; display:block; margin-top:10px;">Cor do Corpo (HEX):</label>
        <input type="color" id="p-color-body" value="#2c3e50">
        
        <label style="font-size: 12px; color: #aaa; display:block; margin-top:10px;">Sua Distro Inicial (Tag):</label>
        <select id="p-tag">
            <option value="LFS">LFS</option>
            <option value="Arch">Arch Linux</option>
            <option value="Kali">Kali Linux</option>
            <option value="Fedora">Fedora</option>
            <option value="Ubuntu">Ubuntu</option>
            <option value="Debian">Debian</option>
        </select>
        
        <button id="btn-enter">ENTRAR NO MUNDO</button>
    </div>
</div>

<div id="game-view">
    <canvas id="gameCanvas"></canvas>
    
    <div id="map-btn" class="btn-ui">MAPA (M)</div>
    <div id="options-btn" class="btn-ui">OPÇÕES ⚙️</div>
    
    <div id="options-menu">
        <button onclick="location.reload()">Sair do Server</button>
        <button onclick="alert('Controles:\n- Mova com WASD ou Setas Teclado\n- Chegue perto dos totens para ativar as Questions\n- Aperte M para o Mapa tático.')">Como Jogar</button>
    </div>

    <div id="challenge-popup">
        <h3 id="challenge-title" style="color: var(--ui-blue); margin-top: 0; font-size: 18px;">PROMPT</h3>
        <p id="challenge-text" style="font-size: 14px; color: #cbd5e1; text-align: left; line-height: 1.5;">Pergunta...</p>
        <div id="challenge-choices"></div>
        <button onclick="closeChallenge()" style="background: #ef4444; margin-top: 15px; border: none; font-weight: bold; cursor: pointer; color:#fff;">CANCELAR CONEXÃO</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();

    // --- PLAYER CONFIG ---
    let player = { x: 0, y: 0, name: "Tux", color: "#333", tag: "LFS", speed: 6 };
    let isMapOpen = false, activeChallenge = null, matrixFrame = 0;
    
    // Estrelas de fundo para o bioma cósmico do Debian
    const stars = Array.from({length: 60}, () => ({ x: Math.random(), y: Math.random(), r: Math.random() * 1.5 }));

    // --- CONFIGURAÇÃO DOS 6 BIOMAS E SEUS DESAFIOS ---
    const biomes = {
        LFS:    { name: "Lobby Central (LFS)", color: "#0d1117", borderColor: "#00ff41" },
        Kali:   { name: "Zona Hacker Kali", color: "#161920", borderColor: "#a855f7" },
        Arch:   { name: "Platô Gélido Arch", color: "#0f172a", borderColor: "#0ea5e9" },
        Ubuntu: { name: "Colinas Ubuntu", color: "#2d1a10", borderColor: "#ea580c" },
        Fedora: { name: "Distrito Tech Fedora", color: "#1e293b", borderColor: "#3b82f6" }
    };

    const totems = [
        {
            id: "kali", name: "Totem Kali Linux", x: 250, y: 200, color: "#a855f7",
            question: "[KALI CHALLENGE] Qual comando do pacote nmap é usado para escanear portas abertas em um IP alvo?",
            choices: ["a) nmap -sS [IP]", "b) apt purge nmap", "c) cd /var/log", "d) ping localhost"], correct: 0
        },
        {
            id: "arch", name: "Totem Arch Linux", x: window.innerWidth - 250, y: 200, color: "#0ea5e9",
            question: "[ARCH CHALLENGE] Qual arquivo de configuração do Arch você edita para ativar repositórios espelhos (mirrors) de download?",
            choices: ["a) /etc/fstab", "b) /etc/pacman.d/mirrorlist", "c) /etc/hostname", "d) /boot/grub.cfg"], correct: 1
        },
        {
            id: "ubuntu", name: "Totem Ubuntu", x: 250, y: window.innerHeight - 250, color: "#ea580c",
            question: "[UBUNTU CHALLENGE] Como adicionar com segurança um repositório PPA de terceiros via terminal no Ubuntu?",
            choices: ["a) rm -rf /", "b) sudo apt-get clean", "c) sudo add-apt-repository ppa:[nome]", "d) cat /etc/issue"], correct: 2
        },
        {
            id: "fedora", name: "Totem Fedora", x: window.innerWidth - 250, y: window.innerHeight - 250, color: "#3b82f6",
            question: "[FEDORA CHALLENGE] Qual é o gerenciador de pacotes moderno do Fedora usado para instalar arquivos .rpm?",
            choices: ["a) pacman", "b) dnf", "c) apt-get", "d) snap"], correct: 1
        }
    ];

    // --- CONTROLES DE INTERFACE ---
    const startScreen = document.getElementById('start-screen');
    const gameView = document.getElementById('game-view');
    const btnEnter = document.getElementById('btn-enter');
    const optionsBtn = document.getElementById('options-btn');
    const optionsMenu = document.getElementById('options-menu');
    const challengePopup = document.getElementById('challenge-popup');

    btnEnter.onclick = () => {
        player.name = document.getElementById('p-name').value || "Tuxer";
        player.color = document.getElementById('p-color-body').value;
        player.tag = document.getElementById('p-tag').value;
        
        startScreen.style.display = 'none';
        gameView.style.display = 'block';
        
        // Coloca o pinguim no centro exato do Lobby
        player.x = canvas.width / 2; player.y = canvas.height / 2;
        
        // Ajusta totens da direita/baixo ao tamanho da janela do usuário
        totems[1].x = canvas.width - 250;
        totems[2].y = canvas.height - 250;
        totems[3].x = canvas.width - 250; totems[3].y = canvas.height - 250;

        gameLoop();
    };

    optionsBtn.onclick = () => optionsMenu.style.display = optionsMenu.style.display === 'flex' ? 'none' : 'flex';

    const keys = {};
    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.code === 'KeyM') toggleMap();
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function toggleMap() { if (!activeChallenge) isMapOpen = !isMapOpen; }

    // --- ENGINE DE PERGUNTAS ---
    function openChallenge(totem) {
        if (activeChallenge) return;
        activeChallenge = totem;
        
        document.getElementById('challenge-title').innerText = `CONEXÃO: ${totem.name.toUpperCase()}`;
        document.getElementById('challenge-title').style.color = totem.color;
        document.getElementById('challenge-text').innerText = totem.question;
        
        const divChoices = document.getElementById('challenge-choices');
        divChoices.innerHTML = "";
        
        totem.choices.forEach((choice, idx) => {
            const b = document.createElement('button');
            b.className = "btn-choice"; b.innerText = choice;
            b.onclick = () => {
                if (idx === totem.correct) {
                    alert("🔓 COMANDO CORRETO! Sistema descriptografado.");
                    player.tag = totem.id.charAt(0).toUpperCase() + totem.id.slice(1); // Atualiza tag na hora!
                    closeChallenge();
                } else {
                    alert("❌ Sintaxe incorreta. Kernel recusou o comando!");
                }
            };
            divChoices.appendChild(b);
        });
        challengePopup.style.display = 'block';
    }

    function closeChallenge() {
        challengePopup.style.display = 'none'; activeChallenge = null;
        player.x += (player.x < canvas.width/2) ? 45 : -45; // Empurra pinguim para fora do sensor
    }

    // --- RENDERIZADOR DOS BIOMAS GRÁFICOS ---
    function drawWorld() {
        // 1. BIOMA CÓSMICO DEBIAN (Fundo do Espaço sideral em todo o mapa)
        ctx.fillStyle = "#030208"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI*2); ctx.fill(); });
        
        // Desenha a grande Espiral Roxa da Debian no fundo do mapa
        ctx.strokeStyle = "rgba(168, 85, 247, 0.15)"; ctx.lineWidth = 6;
        ctx.beginPath();
        for (let i = 0; i < 150; i++) {
            let angle = 0.1 * i;
            let x = canvas.width / 2 + (10 + 4 * angle) * Math.cos(angle);
            let y = canvas.height / 2 + (10 + 4 * angle) * Math.sin(angle);
            ctx.lineTo(x, y);
        }
        ctx.stroke();

        const cx = canvas.width / 2; const cy = canvas.height / 2;

        // Caminhos de Redes (Pontes) ligando os biomas
        ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 40;
        ctx.beginPath(); ctx.moveTo(cx, 100); ctx.lineTo(cx, canvas.height-100); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(100, cy); ctx.lineTo(canvas.width-100, cy); ctx.stroke();

        // 2. BIOMA LFS (Centro - O Vazio Matrix)
        ctx.fillStyle = biomes.LFS.color; ctx.fillRect(cx - 150, cy - 150, 300, 300);
        ctx.strokeStyle = biomes.LFS.borderColor; ctx.lineWidth = 3; ctx.strokeRect(cx - 150, cy - 150, 300, 300);
        
        // Chuva Binária
        ctx.fillStyle = "rgba(0, 255, 65, 0.12)"; ctx.font = "10px monospace"; matrixFrame++;
        for(let i=0; i<12; i++) {
            for(let j=0; j<12; j++) {
                ctx.fillText((Math.random() > 0.5 ? "1" : "0"), (cx - 135) + i*24, (cy - 130) + j*24 + (matrixFrame % 12));
            }
        }
        ctx.fillStyle = varColor('--matrix-green'); ctx.font = "bold 11px monospace"; ctx.fillText("[ LFS LOBBY ]", cx - 40, cy - 125);

        // 3. BIOMA KALI (Sup. Esquerdo - Zona Hacker)
        ctx.fillStyle = biomes.Kali.color; ctx.fillRect(80, 80, 260, 220);
        ctx.strokeStyle = biomes.Kali.borderColor; ctx.strokeRect(80, 80, 260, 220);
        // Rachaduras Neon Roxas no chão do Kali
        ctx.strokeStyle = "rgba(168, 85, 247, 0.4)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(90,90); ctx.lineTo(150,160); ctx.lineTo(220,130); ctx.stroke();
        ctx.fillStyle = "#a855f7"; ctx.fillText("KALI CYBER ZONE 💀", 100, 110);

        // 4. BIOMA ARCH (Sup. Direito - Platô Minimalista de Gelo)
        ctx.fillStyle = biomes.Arch.color; ctx.fillRect(canvas.width - 340, 80, 260, 220);
        ctx.strokeStyle = biomes.Arch.borderColor; ctx.strokeRect(canvas.width - 340, 80, 260, 220);
        // Desenha Monólito no centro do Arch
        ctx.fillStyle = "#020617"; ctx.fillRect(canvas.width - 220, 150, 30, 70);
        ctx.strokeStyle = "#0ea5e9"; ctx.strokeRect(canvas.width - 220, 150, 30, 70);
        ctx.fillStyle = "#0ea5e9"; ctx.fillText("ARCH COLD BASE 🧊", canvas.width - 320, 110);

        // 5. BIOMA UBUNTU (Inf. Esquerdo - Colinas de Terra Laranja)
        ctx.fillStyle = biomes.Ubuntu.color; ctx.fillRect(80, canvas.height - 300, 260, 220);
        ctx.strokeStyle = biomes.Ubuntu.borderColor; ctx.strokeRect(80, canvas.height - 300, 260, 220);
        // Círculo de Pedras do Ubuntu (Círculo de comunidade)
        ctx.strokeStyle = "#ea580c"; ctx.beginPath(); ctx.arc(210, canvas.height - 190, 40, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = "#ea580c"; ctx.fillText("UBUNTU ECO-CAMP 🟠", 100, canvas.height - 275);

        // 6. BIOMA FEDORA (Inf. Direito - Distrito Tech de Aço)
        ctx.fillStyle = biomes.Fedora.color; ctx.fillRect(canvas.width - 340, canvas.height - 300, 260, 220);
        ctx.strokeStyle = biomes.Fedora.borderColor; ctx.strokeRect(canvas.width - 340, canvas.height - 300, 260, 220);
        // Linhas de circuito azul de alta tecnologia no Fedora
        ctx.strokeStyle = "rgba(59, 130, 246, 0.6)"; ctx.beginPath();
        ctx.moveTo(canvas.width - 320, canvas.height - 150); ctx.lineTo(canvas.width - 200, canvas.height - 150);
        ctx.lineTo(canvas.width - 150, canvas.height - 220); ctx.stroke();
        ctx.fillStyle = "#3b82f6"; ctx.fillText("FEDORA TECH DOMO 🔵", canvas.width - 320, canvas.height - 275);

        // DESENHAR OS TOTENS DE INTERAÇÃO
        totems.forEach(t => {
            ctx.fillStyle = t.color; ctx.beginPath(); ctx.arc(t.x, t.y, 20, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = "#fff"; ctx.font = "9px monospace"; ctx.textAlign = "center";
            ctx.fillText("💻 TERMINAL", t.x, t.y - 25);
        });
    }

    // --- VISÃO MAPA GERAL (TECLA M) ---
    function drawTacticalMap() {
        ctx.fillStyle = "rgba(4, 6, 12, 0.96)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = varColor('--ui-blue'); ctx.lineWidth = 4; ctx.strokeRect(40, 40, canvas.width - 80, canvas.height - 80);

        ctx.fillStyle = varColor('--ui-blue'); ctx.font = "bold 20px monospace"; ctx.textAlign = "center";
        ctx.fillText("MAPA GLOBAL DE BIOMAS - TUX TOWN", canvas.width / 2, 80);

        const mx = canvas.width / 2; const my = canvas.height / 2;
        
        // Miniaturas das zonas no radar
        ctx.font = "11px monospace";
        ctx.fillStyle = "#0d1117"; ctx.fillRect(mx-50, my-50, 100, 100); ctx.fillStyle = "#00ff41"; ctx.fillText("LFS", mx, my+5);
        ctx.fillStyle = "#161920"; ctx.fillRect(mx-180, my-130, 90, 70); ctx.fillStyle = "#a855f7"; ctx.fillText("KALI", mx-135, my-90);
        ctx.fillStyle = "#0f172a"; ctx.fillRect(mx+90, my-130, 90, 70);  ctx.fillStyle = "#0ea5e9"; ctx.fillText("ARCH", mx+135, my-90);
        ctx.fillStyle = "#2d1a10"; ctx.fillRect(mx-180, my+60, 90, 70);  ctx.fillStyle = "#ea580c"; ctx.fillText("UBUNTU", mx-135, my+100);
        ctx.fillStyle = "#1e293b"; ctx.fillRect(mx+90, my+60, 90, 70);   ctx.fillStyle = "#3b82f6"; ctx.fillText("FEDORA", mx+135, my+100);

        // Indicador do player piscando no minimapa
        let pulse = Math.abs(Math.sin(Date.now() / 150)) * 6;
        ctx.fillStyle = "#ef4444"; ctx.beginPath();
        let pMiniX = mx + (player.x - canvas.width/2) * 0.45;
        let pMiniY = my + (player.y - canvas.height/2) * 0.45;
        ctx.arc(pMiniX, pMiniY, 5 + pulse, 0, Math.PI * 2); ctx.fill();
        ctx.fillText("VOCÊ", pMiniX, pMiniY - 12);

        ctx.fillStyle = "#666"; ctx.fillText("[ Aperte 'M' para retornar ao Servidor ]", canvas.width / 2, canvas.height - 70);
    }

    // --- DESENHO DO TUX ---
    function drawPlayer() {
        const x = player.x, y = player.y; ctx.textAlign = "center";
        
        // Caixa de Badge/Tag da Distro
        ctx.fillStyle = "rgba(15, 23, 42, 0.9)"; ctx.fillRect(x - 35, y - 52, 70, 15);
        ctx.strokeStyle = varColor('--ui-blue'); ctx.strokeRect(x - 35, y - 52, 70, 15);
        ctx.fillStyle = "#fff"; ctx.font = "bold 9px Arial"; ctx.fillText(player.tag.toUpperCase(), x, y - 41);

        // Identificação (Nome)
        ctx.fillStyle = "#fff"; ctx.font = "11px monospace"; ctx.fillText(player.name, x, y + 33);

        // Corpo
        ctx.fillStyle = player.color; ctx.beginPath(); ctx.ellipse(x, y, 16, 22, 0, 0, Math.PI*2); ctx.fill();
        // Barriga
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(x, y+4, 10, 15, 0, 0, Math.PI*2); ctx.fill();
        // Rosto
        ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(x-4, y-8, 1.8, 0, 7); ctx.fill(); ctx.beginPath(); ctx.arc(x+4, y-8, 1.8, 0, 7); ctx.fill();
        ctx.fillStyle = "orange"; ctx.fillRect(x-3, y-4, 6, 4);
    }

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (isMapOpen) {
            drawTacticalMap();
        } else {
            // Movimentação comum
            if (!activeChallenge) {
                if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
                if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
                if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
                if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
            }

            // Bloqueadores de bordas da tela
            if (player.x < 20) player.x = 20; if (player.x > canvas.width - 20) player.x = canvas.width - 20;
            if (player.y < 20) player.y = 20; if (player.y > canvas.height - 20) player.y = canvas.height - 20;

            // Motor de colisão com os Terminais
            if (!activeChallenge) {
                totems.forEach(t => {
                    let d = Math.sqrt((player.x - t.x)**2 + (player.y - t.y)**2);
                    if (d < 35) openChallenge(t);
                });
            }

            drawWorld();
            drawPlayer();
        }
        requestAnimationFrame(loop);
    }

    function gameLoop() { loop(); }
    function varColor(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
    window.onresize = () => { resize(); };
</script>
</body>
</html>
