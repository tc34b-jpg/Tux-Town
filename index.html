<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tux Town - Open World Camera Update</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --ui-blue: #3498db;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #020205;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100%;
        }

        /* --- TELA DE INÍCIO --- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }

        .menu-card {
            background: rgba(20, 20, 20, 0.95);
            padding: 30px; border-radius: 15px;
            border: 2px solid var(--matrix-green);
            box-shadow: 0 0 25px var(--matrix-green);
            width: 350px; text-align: center;
        }

        #game-view { display: none; position: relative; width: 100vw; height: 100vh; }

        /* --- UI OVERLAYS --- */
        .btn-ui {
            position: absolute; background: rgba(0,0,0,0.85);
            border: 2px solid var(--ui-blue); color: var(--ui-blue);
            padding: 10px 20px; cursor: pointer; border-radius: 6px;
            font-weight: bold; font-family: monospace; z-index: 10;
        }
        .btn-ui:hover { background: var(--ui-blue); color: #fff; box-shadow: 0 0 10px var(--ui-blue); }

        #map-btn { bottom: 20px; left: 20px; }
        #options-btn { top: 20px; right: 20px; }

        #options-menu {
            position: absolute; top: 70px; right: 20px;
            background: rgba(0,0,0,0.95); border: 1px solid #444;
            display: none; flex-direction: column; padding: 10px; border-radius: 5px; z-index: 10;
        }

        /* --- POPUP DE PERGUNTAS --- */
        #challenge-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #090d16; border: 2px solid var(--ui-blue);
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.5);
            padding: 25px; border-radius: 8px; display: none;
            width: 450px; text-align: center; z-index: 40;
        }

        input, select, button {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 6px; border: 1px solid #333;
            background: #151515; color: #fff; font-family: monospace; box-sizing: border-box;
        }
        #btn-enter { background: var(--matrix-green); color: #000; font-weight: bold; cursor: pointer; border: none; }
        .btn-choice { background: #0f172a; border: 1px solid #1e293b; text-align: left; cursor: pointer; transition: 0.2s; }
        .btn-choice:hover { background: var(--ui-blue); border-color: #fff; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="color: var(--matrix-green); font-size: 3.5em; margin-bottom: 5px; letter-spacing: 2px;">TUX TOWN</h1>
    <p style="color: #888; margin-top: 0; margin-bottom: 25px;">Open World Update v3.0 🎬</p>
    <div class="menu-card">
        <h3 style="margin-top: 0; color: #fff;">CRIE SEU PINGUIM</h3>
        <input type="text" id="p-name" placeholder="Nome do seu Tux..." maxlength="12" value="TuxExplorer">
        
        <label style="font-size: 12px; color: #aaa; display:block; margin-top:10px;">Cor do Corpo (HEX):</label>
        <input type="color" id="p-color-body" value="#2c3e50">
        
        <label style="font-size: 12px; color: #aaa; display:block; margin-top:10px;">Sua Distro Inicial (Tag):</label>
        <select id="p-tag">
            <option value="LFS">LFS</option>
            <option value="Arch">Arch Linux</option>
            <option value="Kali">Kali Linux</option>
            <option value="Fedora">Fedora</option>
            <option value="Ubuntu">Ubuntu</option>
            <option value="Debian">Debian</option>
        </select>
        
        <button id="btn-enter">ENTRAR NO MUNDO GIGANTE</button>
    </div>
</div>

<div id="game-view">
    <canvas id="gameCanvas"></canvas>
    
    <div id="map-btn" class="btn-ui">MAPA (M)</div>
    <div id="options-btn" class="btn-ui">OPÇÕES ⚙️</div>
    
    <div id="options-menu">
        <button onclick="location.reload()">Sair do Server</button>
        <button onclick="alert('Controles:\n- ANDE PELO MAPA GIGANTE com WASD ou Setas\n- A câmera vai correr junto com você!\n- Aperte M para ver o Radar Global.')">Como Jogar</button>
    </div>

    <div id="challenge-popup">
        <h3 id="challenge-title" style="color: var(--ui-blue); margin-top: 0; font-size: 18px;">PROMPT</h3>
        <p id="challenge-text" style="font-size: 14px; color: #cbd5e1; text-align: left; line-height: 1.5;">Pergunta...</p>
        <div id="challenge-choices"></div>
        <button onclick="closeChallenge()" style="background: #ef4444; margin-top: 15px; border: none; font-weight: bold; cursor: pointer; color:#fff;">CANCELAR CONEXÃO</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();

    // --- DIMENSÕES DO MAPA GIGANTE (MUNDO IN-GAME) ---
    const WORLD_WIDTH = 3000;
    const WORLD_HEIGHT = 3000;

    // --- PLAYER CONFIG ---
    let player = { 
        x: WORLD_WIDTH / 2, y: WORLD_HEIGHT / 2, // Começa no centro exato do mapa gigante
        name: "Tux", color: "#333", tag: "LFS", speed: 7 
    };
    
    // Objeto da Câmera que vai seguir as coordenadas do Tux
    let camera = { x: 0, y: 0 };
    
    let isMapOpen = false, activeChallenge = null, matrixFrame = 0;
    
    // Estrelas mapeadas no universo gigante
    const stars = Array.from({length: 350}, () => ({ x: Math.random() * WORLD_WIDTH, y: Math.random() * WORLD_HEIGHT, r: Math.random() * 1.8 }));

    // --- CONFIGURAÇÃO DOS BIOMAS CENTRALIZADOS NO MUNDO REAL ---
    const totems = [
        {
            id: "kali", name: "Totem Kali Linux", x: 400, y: 400, color: "#a855f7",
            question: "[KALI] Qual comando do pacote nmap é usado para escanear portas abertas em um IP alvo?",
            choices: ["a) nmap -sS [IP]", "b) apt purge nmap", "c) cd /var/log", "d) ping localhost"], correct: 0
        },
        {
            id: "arch", name: "Totem Arch Linux", x: WORLD_WIDTH - 400, y: 400, color: "#0ea5e9",
            question: "[ARCH] Qual arquivo de configuração do Arch você edita para ativar repositórios espelhos de download?",
            choices: ["a) /etc/fstab", "b) /etc/pacman.d/mirrorlist", "c) /etc/hostname", "d) /boot/grub.cfg"], correct: 1
        },
        {
            id: "ubuntu", name: "Totem Ubuntu", x: 400, y: WORLD_HEIGHT - 400, color: "#ea580c",
            question: "[UBUNTU] Como adicionar com segurança um repositório PPA de terceiros via terminal no Ubuntu?",
            choices: ["a) rm -rf /", "b) sudo apt-get clean", "c) sudo add-apt-repository ppa:[nome]", "d) cat /etc/issue"], correct: 2
        },
        {
            id: "fedora", name: "Totem Fedora", x: WORLD_WIDTH - 400, y: WORLD_HEIGHT - 400, color: "#3b82f6",
            question: "[FEDORA] Qual é o gerenciador de pacotes moderno do Fedora usado para instalar arquivos .rpm?",
            choices: ["a) pacman", "b) dnf", "c) apt-get", "d) snap"], correct: 1
        }
    ];

    // --- BOTÕES ---
    const startScreen = document.getElementById('start-screen');
    const gameView = document.getElementById('game-view');
    const btnEnter = document.getElementById('btn-enter');
    const optionsBtn = document.getElementById('options-btn');
    const optionsMenu = document.getElementById('options-menu');
    const mapBtn = document.getElementById('map-btn');
    const challengePopup = document.getElementById('challenge-popup');

    btnEnter.onclick = () => {
        player.name = document.getElementById('p-name').value || "Tuxer";
        player.color = document.getElementById('p-color-body').value;
        player.tag = document.getElementById('p-tag').value;
        
        startScreen.style.display = 'none';
        gameView.style.display = 'block';
        gameLoop();
    };

    optionsBtn.onclick = () => optionsMenu.style.display = optionsMenu.style.display === 'flex' ? 'none' : 'flex';
    mapBtn.onclick = () => toggleMap();

    const keys = {};
    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.code === 'KeyM') toggleMap();
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function toggleMap() { if (!activeChallenge) isMapOpen = !isMapOpen; }

    function openChallenge(totem) {
        if (activeChallenge) return;
        activeChallenge = totem;
        
        document.getElementById('challenge-title').innerText = `CONEXÃO: ${totem.name.toUpperCase()}`;
        document.getElementById('challenge-title').style.color = totem.color;
        document.getElementById('challenge-text').innerText = totem.question;
        
        const divChoices = document.getElementById('challenge-choices');
        divChoices.innerHTML = "";
        
        totem.choices.forEach((choice, idx) => {
            const b = document.createElement('button');
            b.className = "btn-choice"; b.innerText = choice;
            b.onclick = () => {
                if (idx === totem.correct) {
                    alert("🔓 CONEXÃO ESTABELECIDA! Tag Atualizada.");
                    player.tag = totem.id.charAt(0).toUpperCase() + totem.id.slice(1);
                    closeChallenge();
                } else {
                    alert("❌ Código recusado pelo firewall da Distro!");
                }
            };
            divChoices.appendChild(b);
        });
        challengePopup.style.display = 'block';
    }

    function closeChallenge() {
        challengePopup.style.display = 'none'; activeChallenge = null;
        player.x += (player.x < WORLD_WIDTH/2) ? 60 : -60; // Empurra para fora da área do totem
    }

    // --- DRAW WORLD (RENDERS USING CAMERA OFFSET) ---
    function drawWorld() {
        // Aplica o cálculo de onde o foco da tela deve estar com base no player
        camera.x = player.x - canvas.width / 2;
        camera.y = player.y - canvas.height / 2;

        // Fundo Sideral Espacial (Bioma Debian)
        ctx.fillStyle = "#030208"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Estrelas se movem de acordo com a câmera
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        stars.forEach(s => {
            let sx = s.x - camera.x; let sy = s.y - camera.y;
            // Apenas renderiza se estiver visível no monitor
            if(sx >= 0 && sx <= canvas.width && sy >= 0 && sy <= canvas.height) {
                ctx.beginPath(); ctx.arc(sx, sy, s.r, 0, Math.PI*2); ctx.fill();
            }
        });
        
        // Grande Espiral Roxa da Debian desenhada no centro do Universo Gigante
        ctx.strokeStyle = "rgba(168, 85, 247, 0.12)"; ctx.lineWidth = 8; ctx.beginPath();
        for (let i = 0; i < 200; i++) {
            let angle = 0.15 * i;
            let x = (WORLD_WIDTH / 2) + (15 + 5 * angle) * Math.cos(angle) - camera.x;
            let y = (WORLD_HEIGHT / 2) + (15 + 5 * angle) * Math.sin(angle) - camera.y;
            ctx.lineTo(x, y);
        }
        ctx.stroke();

        const cx = WORLD_WIDTH / 2 - camera.x; 
        const cy = WORLD_HEIGHT / 2 - camera.y;

        // Grandes Rodovias Digitais (Pontes) interligando os mundos gigantes
        ctx.strokeStyle = "#121824"; ctx.lineWidth = 60;
        ctx.beginPath(); ctx.moveTo(WORLD_WIDTH/2 - camera.x, 200 - camera.y); ctx.lineTo(WORLD_WIDTH/2 - camera.x, WORLD_HEIGHT - 200 - camera.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(200 - camera.x, WORLD_HEIGHT/2 - camera.y); ctx.lineTo(WORLD_WIDTH - 200 - camera.x, WORLD_HEIGHT/2 - camera.y); ctx.stroke();

        // 1. ILHA CENTRAL GIGANTE (LFS - O Vazio Matrix)
        let lfsX = WORLD_WIDTH / 2 - 250 - camera.x;
        let lfsY = WORLD_HEIGHT / 2 - 250 - camera.y;
        ctx.fillStyle = "#0d1117"; ctx.fillRect(lfsX, lfsY, 500, 500);
        ctx.strokeStyle = "#00ff41"; ctx.lineWidth = 3; ctx.strokeRect(lfsX, lfsY, 500, 500);
        
        // Chuva Binária no Lobby
        ctx.fillStyle = "rgba(0, 255, 65, 0.1)"; ctx.font = "11px monospace"; matrixFrame++;
        for(let i=0; i<18; i++) {
            for(let j=0; j<18; j++) {
                ctx.fillText((Math.random() > 0.5 ? "1" : "0"), lfsX + 20 + i*26, lfsY + 30 + j*26 + (matrixFrame % 10));
            }
        }
        ctx.fillStyle = "#00ff41"; ctx.font = "bold 14px monospace"; ctx.textAlign = "center";
        ctx.fillText("[ LFS CORE SERVER LOBBY ]", WORLD_WIDTH/2 - camera.x, WORLD_HEIGHT/2 - 210 - camera.y);

        // 2. BIOMA KALI (Canto Superior Esquerdo do Universo)
        let kaliX = 150 - camera.x; let kaliY = 150 - camera.y;
        ctx.fillStyle = "#161920"; ctx.fillRect(kaliX, kaliY, 500, 400);
        ctx.strokeStyle = "#a855f7"; ctx.strokeRect(kaliX, kaliY, 500, 400);
        ctx.strokeStyle = "rgba(168, 85, 247, 0.3)"; ctx.lineWidth = 2; ctx.beginPath();
        ctx.moveTo(kaliX+20, kaliY+20); ctx.lineTo(kaliX+200, kaliY+250); ctx.lineTo(kaliX+400, kaliY+150); ctx.stroke();
        ctx.fillStyle = "#a855f7"; ctx.font = "14px monospace"; ctx.fillText("KALI CYBER DISTRICT 💀", kaliX + 180, kaliY + 40);

        // 3. BIOMA ARCH (Canto Superior Direito)
        let archX = (WORLD_WIDTH - 650) - camera.x; let archY = 150 - camera.y;
        ctx.fillStyle = "#0f172a"; ctx.fillRect(archX, archY, 500, 400);
        ctx.strokeStyle = "#0ea5e9"; ctx.strokeRect(archX, archY, 500, 400);
        // Monólito Arch
        ctx.fillStyle = "#020617"; ctx.fillRect(archX + 230, archY + 150, 40, 120);
        ctx.strokeStyle = "#0ea5e9"; ctx.strokeRect(archX + 230, archY + 150, 40, 120);
        ctx.fillStyle = "#0ea5e9"; ctx.fillText("ARCH FROZEN PLATFORM 🧊", archX + 200, archY + 40);

        // 4. BIOMA UBUNTU (Canto Inferior Esquerdo)
        let uX = 150 - camera.x; let uY = (WORLD_HEIGHT - 550) - camera.y;
        ctx.fillStyle = "#2d1a10"; ctx.fillRect(uX, uY, 500, 400);
        ctx.strokeStyle = "#ea580c"; ctx.strokeRect(uX, uY, 500, 400);
        ctx.strokeStyle = "#ea580c"; ctx.beginPath(); ctx.arc(uX + 250, uY + 200, 60, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = "#ea580c"; ctx.fillText("UBUNTU COMMUNITY CAMP 🟠", uX + 200, uY + 40);

        // 5. BIOMA FEDORA (Canto Inferior Direito)
        let fedX = (WORLD_WIDTH - 650) - camera.x; let fedY = (WORLD_HEIGHT - 550) - camera.y;
        ctx.fillStyle = "#1e293b"; ctx.fillRect(fedX, fedY, 500, 400);
        ctx.strokeStyle = "#3b82f6"; ctx.strokeRect(fedX, fedY, 500, 400);
        ctx.strokeStyle = "rgba(59, 130, 246, 0.5)"; ctx.beginPath();
        ctx.moveTo(fedX+50, fedY+300); ctx.lineTo(fedX+250, fedY+300); ctx.lineTo(fedX+350, fedY+150); ctx.stroke();
        ctx.fillStyle = "#3b82f6"; ctx.fillText("FEDORA AUTOMATION DOCK 🔵", fedX + 200, fedY + 40);

        // DESENHAR OS TOTENS EM SUAS COORDENADAS REAIS DO MAPA
        totems.forEach(t => {
            let tx = t.x - camera.x; let ty = t.y - camera.y;
            ctx.fillStyle = t.color; ctx.beginPath(); ctx.arc(tx, ty, 25, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();
            ctx.fillStyle = "#fff"; ctx.font = "bold 10px monospace"; ctx.textAlign = "center";
            ctx.fillText("💻 TERMINAL", tx, ty - 32);
        });
    }

    // --- RADAR / MINIMAPA GLOBAL (M) ---
    function drawTacticalMap() {
        ctx.fillStyle = "rgba(4, 6, 12, 0.98)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = varColor('--ui-blue'); ctx.lineWidth = 4; ctx.strokeRect(40, 40, canvas.width - 80, canvas.height - 80);

        ctx.fillStyle = varColor('--ui-blue'); ctx.font = "bold 22px monospace"; ctx.textAlign = "center";
        ctx.fillText("SISTEMA DE RADAR GLOBAL (MUNDO EXPANDIDO)", canvas.width / 2, 80);

        // Foco de render central do radar
        const rx = canvas.width / 2; const ry = canvas.height / 2;
        
        // Desenha as representações proporcionais das distâncias no Radar
        ctx.font = "12px monospace";
        ctx.fillStyle = "#0d1117"; ctx.fillRect(rx-40, ry-40, 80, 80); ctx.fillStyle = "#00ff41"; ctx.fillText("LFS (LOBBY)", rx, ry+5);
        ctx.fillStyle = "#161920"; ctx.fillRect(rx-190, ry-140, 100, 80); ctx.fillStyle = "#a855f7"; ctx.fillText("KALI ZONE", rx-140, ry-100);
        ctx.fillStyle = "#0f172a"; ctx.fillRect(rx+90, ry-140, 100, 80);  ctx.fillStyle = "#0ea5e9"; ctx.fillText("ARCH BASE", rx+140, ry-100);
        ctx.fillStyle = "#2d1a10"; ctx.fillRect(rx-190, ry+60, 100, 80);  ctx.fillStyle = "#ea580c"; ctx.fillText("UBUNTU", rx-140, ry+100);
        ctx.fillStyle = "#1e293b"; ctx.fillRect(rx+90, ry+60, 100, 80);   ctx.fillStyle = "#3b82f6"; ctx.fillText("FEDORA", rx+140, ry+100);

        // Bolinha vermelha de rastreamento do jogador no Radar de Escala
        let pulse = Math.abs(Math.sin(Date.now() / 120)) * 7;
        ctx.fillStyle = "#ef4444"; ctx.beginPath();
        // Mapeia a posição real de 3000x3000px para a proporção do radar da janela
        let ratioX = (player.x / WORLD_WIDTH) * 360 + (rx - 180);
        let ratioY = (player.y / WORLD_HEIGHT) * 280 + (ry - 140);
        
        ctx.arc(ratioX, ratioY, 6 + pulse, 0, Math.PI * 2); ctx.fill();
        ctx.fillText("VOCÊ AQUI", ratioX, ratioY - 15);

        ctx.fillStyle = "#555"; ctx.fillText("[ Pressione 'M' para fechar o Radar ]", canvas.width / 2, canvas.height - 70);
    }

    // --- DRAW PLAYER (FIXADO EM RELAÇÃO À CÂMERA) ---
    function drawPlayer() {
        // O jogador é desenhado na sua posição real MENOS o deslocamento da câmera
        const x = player.x - camera.x; const y = player.y - camera.y;
        ctx.textAlign = "center";
        
        // Placa de Badge/Tag
        ctx.fillStyle = "rgba(15, 23, 42, 0.92)"; ctx.fillRect(x - 35, y - 52, 70, 16);
        ctx.strokeStyle = varColor('--ui-blue'); ctx.strokeRect(x - 35, y - 52, 70, 16);
        ctx.fillStyle = "#fff"; ctx.font = "bold 9px Arial"; ctx.fillText(player.tag.toUpperCase(), x, y - 40);

        // Identificação
        ctx.fillStyle = "#fff"; ctx.font = "12px monospace"; ctx.fillText(player.name, x, y + 35);

        // Corpo
        ctx.fillStyle = player.color; ctx.beginPath(); ctx.ellipse(x, y, 17, 23, 0, 0, Math.PI*2); ctx.fill();
        // Barriga
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(x, y+4, 11, 16, 0, 0, Math.PI*2); ctx.fill();
        // Rosto
        ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(x-5, y-8, 2, 0, 7); ctx.fill(); ctx.beginPath(); ctx.arc(x+5, y-8, 2, 0, 7); ctx.fill();
        ctx.fillStyle = "orange"; ctx.fillRect(x-3.5, y-4, 7, 4.5);
    }

    // --- ENGINE PRINCIPAL ---
    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (isMapOpen) {
            drawTacticalMap();
        } else {
            // Movimentação livre pelo mapa infinito
            if (!activeChallenge) {
                if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
                if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
                if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
                if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
            }

            // Bloqueio físico das bordas finais do mapa de 3000px
            if (player.x < 30) player.x = 30; if (player.x > WORLD_WIDTH - 30) player.x = WORLD_WIDTH - 30;
            if (player.y < 30) player.y = 30; if (player.y > WORLD_HEIGHT - 30) player.y = WORLD_HEIGHT - 30;

            // Sensores de Proximidade dos totens gigantes
            if (!activeChallenge) {
                totems.forEach(t => {
                    let distance = Math.sqrt((player.x - t.x)**2 + (player.y - t.y)**2);
                    if (distance < 45) openChallenge(t);
                });
            }

            drawWorld();
            drawPlayer();
        }
        requestAnimationFrame(loop);
    }

    function gameLoop() { loop(); }
    function varColor(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
    window.onresize = () => { resize(); };
</script>
</body>
</html>
