<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tux Town - Mobile Joystick Update</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --ui-blue: #3498db;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #020205;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100%;
            /* Evita que a tela fique dando zoom ou selecionando coisas no celular */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* --- TELA DE INÍCIO --- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }

        .menu-card {
            background: rgba(20, 20, 20, 0.95);
            padding: 20px; border-radius: 15px;
            border: 2px solid var(--matrix-green);
            box-shadow: 0 0 25px var(--matrix-green);
            width: 85%; max-width: 350px; text-align: center;
        }

        #game-view { display: none; position: relative; width: 100vw; height: 100vh; }

        /* --- UI OVERLAYS --- */
        .btn-ui {
            position: absolute; background: rgba(0,0,0,0.85);
            border: 2px solid var(--ui-blue); color: var(--ui-blue);
            padding: 8px 16px; cursor: pointer; border-radius: 6px;
            font-weight: bold; font-family: monospace; z-index: 10;
            font-size: 14px;
        }
        #map-btn { bottom: 20px; right: 20px; } /* Mudado para a direita para não bater com o Joystick */
        #options-btn { top: 20px; right: 20px; }

        #options-menu {
            position: absolute; top: 70px; right: 20px;
            background: rgba(0,0,0,0.95); border: 1px solid #444;
            display: none; flex-direction: column; padding: 10px; border-radius: 5px; z-index: 10;
        }

        /* --- JOYSTICK STYLES (MOBILE ONLY) --- */
        #joystick-container {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%; display: none; /* Só liga via JS se for mobile */
            justify-content: center; align-items: center; z-index: 20;
        }
        #joystick-knob {
            width: 50px; height: 50px;
            background: var(--ui-blue);
            box-shadow: 0 0 10px var(--ui-blue);
            border-radius: 50%; cursor: pointer;
        }

        /* --- POPUP DE PERGUNTAS --- */
        #challenge-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #090d16; border: 2px solid var(--ui-blue);
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.5);
            padding: 20px; border-radius: 8px; display: none;
            width: 90%; max-width: 450px; text-align: center; z-index: 40;
        }

        input, select, button {
            width: 100%; padding: 12px; margin: 8px 0;
            border-radius: 6px; border: 1px solid #333;
            background: #151515; color: #fff; font-family: monospace; box-sizing: border-box;
        }
        #btn-enter { background: var(--matrix-green); color: #000; font-weight: bold; cursor: pointer; border: none; }
        .btn-choice { background: #0f172a; border: 1px solid #1e293b; text-align: left; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="color: var(--matrix-green); font-size: 2.8em; margin-bottom: 5px; letter-spacing: 2px;">TUX TOWN</h1>
    <p style="color: #888; margin-top: 0; margin-bottom: 20px;">Mobile Engine v4.0 📱</p>
    <div class="menu-card">
        <h3 style="margin-top: 0; color: #fff;">CRIE SEU PINGUIM</h3>
        <input type="text" id="p-name" placeholder="Nome do seu Tux..." maxlength="12" value="TuxMobile">
        
        <label style="font-size: 11px; color: #aaa; display:block; margin-top:5px;">Cor do Corpo:</label>
        <input type="color" id="p-color-body" value="#16a085">
        
        <label style="font-size: 11px; color: #aaa; display:block; margin-top:5px;">Sua Distro Inicial:</label>
        <select id="p-tag">
            <option value="LFS">LFS</option>
            <option value="Arch">Arch Linux</option>
            <option value="Kali">Kali Linux</option>
            <option value="Fedora">Fedora</option>
            <option value="Ubuntu">Ubuntu</option>
            <option value="Debian">Debian</option>
        </select>
        
        <button id="btn-enter">ENTRAR NO MUNDO</button>
    </div>
</div>

<div id="game-view">
    <canvas id="gameCanvas"></canvas>
    
    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>
    
    <div id="map-btn" class="btn-ui">MAPA (M)</div>
    <div id="options-btn" class="btn-ui">OPÇÕES ⚙️</div>
    
    <div id="options-menu">
        <button onclick="location.reload()">Sair do Server</button>
        <button onclick="alert('Controles:\n- PC: Use WASD/Setas do Teclado\n- Celular: Use o Joystick na tela e clique nos botões!')">Como Jogar</button>
    </div>

    <div id="challenge-popup">
        <h3 id="challenge-title" style="color: var(--ui-blue); margin-top: 0; font-size: 16px;">PROMPT</h3>
        <p id="challenge-text" style="font-size: 13px; color: #cbd5e1; text-align: left; line-height: 1.4;">Pergunta...</p>
        <div id="challenge-choices"></div>
        <button onclick="closeChallenge()" style="background: #ef4444; margin-top: 15px; border: none; font-weight: bold; cursor: pointer; color:#fff;">CANCELAR CONEXÃO</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();

    // --- CONFIGS GLOBAIS ---
    const WORLD_WIDTH = 3000;
    const WORLD_HEIGHT = 3000;

    let player = { x: WORLD_WIDTH / 2, y: WORLD_HEIGHT / 2, name: "Tux", color: "#333", tag: "LFS", speed: 6 };
    let camera = { x: 0, y: 0 };
    let isMapOpen = false, activeChallenge = null, matrixFrame = 0;
    let isMobile = false;

    // Elementos do Joystick
    const joystickContainer = document.getElementById('joystick-container');
    const joystickKnob = document.getElementById('joystick-knob');
    let joystickVector = { x: 0, y: 0 }; // Guarda para onde o joystick está apontando

    const stars = Array.from({length: 300}, () => ({ x: Math.random() * WORLD_WIDTH, y: Math.random() * WORLD_HEIGHT, r: Math.random() * 1.6 }));

    const totems = [
        {
            id: "kali", name: "Totem Kali Linux", x: 400, y: 400, color: "#a855f7",
            question: "[KALI] Qual comando do pacote nmap é usado para escanear portas abertas em um IP alvo?",
            choices: ["a) nmap -sS [IP]", "b) apt purge nmap", "c) cd /var/log", "d) ping localhost"], correct: 0
        },
        {
            id: "arch", name: "Totem Arch Linux", x: WORLD_WIDTH - 400, y: 400, color: "#0ea5e9",
            question: "[ARCH] Qual arquivo de configuração do Arch você edita para ativar repositórios espelhos de download?",
            choices: ["a) /etc/fstab", "b) /etc/pacman.d/mirrorlist", "c) /etc/hostname", "d) /boot/grub.cfg"], correct: 1
        },
        {
            id: "ubuntu", name: "Totem Ubuntu", x: 400, y: WORLD_HEIGHT - 400, color: "#ea580c",
            question: "[UBUNTU] Como adicionar com segurança um repositório PPA de terceiros via terminal no Ubuntu?",
            choices: ["a) rm -rf /", "b) sudo apt-get clean", "c) sudo add-apt-repository ppa:[nome]", "d) cat /etc/issue"], correct: 2
        },
        {
            id: "fedora", name: "Totem Fedora", x: WORLD_WIDTH - 400, y: WORLD_HEIGHT - 400, color: "#3b82f6",
            question: "[FEDORA] Qual é o gerenciador de pacotes moderno do Fedora usado para instalar arquivos .rpm?",
            choices: ["a) pacman", "b) dnf", "c) apt-get", "d) snap"], correct: 1
        }
    ];

    // --- INTERFACE ELEMENTOS ---
    const startScreen = document.getElementById('start-screen');
    const gameView = document.getElementById('game-view');
    const btnEnter = document.getElementById('btn-enter');
    const optionsBtn = document.getElementById('options-btn');
    const optionsMenu = document.getElementById('options-menu');
    const mapBtn = document.getElementById('map-btn');
    const challengePopup = document.getElementById('challenge-popup');

    // --- DETECTA SE É MOBILE ---
    function checkDevice() {
        isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth < 800);
        if (isMobile) {
            joystickContainer.style.display = 'flex'; // Liga o joystick na tela
        }
    }

    btnEnter.onclick = () => {
        player.name = document.getElementById('p-name').value || "Tuxer";
        player.color = document.getElementById('p-color-body').value;
        player.tag = document.getElementById('p-tag').value;
        
        startScreen.style.display = 'none';
        gameView.style.display = 'block';
        checkDevice(); // Roda a detecção ao entrar
        gameLoop();
    };

    optionsBtn.onclick = () => optionsMenu.style.display = optionsMenu.style.display === 'flex' ? 'none' : 'flex';
    mapBtn.onclick = () => toggleMap();

    // --- SISTEMA DE JOYSTICK (TOQUE TOUCH) ---
    let joystickActive = false;
    let dragStart = { x: 0, y: 0 };
    const maxRadius = 45; // Máximo que a bolinha azul pode correr dentro do aro

    joystickContainer.addEventListener('touchstart', (e) => {
        joystickActive = true;
        const touch = e.touches[0];
        const rect = joystickContainer.getBoundingClientRect();
        // Centro do analógico
        dragStart = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
    });

    window.addEventListener('touchmove', (e) => {
        if (!joystickActive) return;
        const touch = e.touches[0];
        
        let dx = touch.clientX - dragStart.x;
        let dy = touch.clientY - dragStart.y;
        let distance = Math.sqrt(dx*dx + dy*dy);

        if (distance > maxRadius) {
            dx = (dx / distance) * maxRadius;
            dy = (dy / distance) * maxRadius;
            distance = maxRadius;
        }

        // Move a bolinha visualmente
        joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;

        // Transforma o arrasto em velocidade pro Tux (entre -1 e 1)
        joystickVector.x = dx / maxRadius;
        joystickVector.y = dy / maxRadius;
    });

    window.addEventListener('touchend', () => {
        joystickActive = false;
        joystickKnob.style.transform = `translate(0px, 0px)`; // Volta pro centro
        joystickVector = { x: 0, y: 0 }; // Para o pinguim
    });

    // --- CONTROLES DE TECLADO (PC) ---
    const keys = {};
    window.onkeydown = (e) => { keys[e.code] = true; if(e.code === 'KeyM') toggleMap(); };
    window.onkeyup = (e) => keys[e.code] = false;

    function toggleMap() { if (!activeChallenge) isMapOpen = !isMapOpen; }

    function openChallenge(totem) {
        if (activeChallenge) return;
        activeChallenge = totem;
        
        document.getElementById('challenge-title').innerText = `CONEXÃO: ${totem.name.toUpperCase()}`;
        document.getElementById('challenge-title').style.color = totem.color;
        document.getElementById('challenge-text').innerText = totem.question;
        
        const divChoices = document.getElementById('challenge-choices');
        divChoices.innerHTML = "";
        
        totem.choices.forEach((choice, idx) => {
            const b = document.createElement('button');
            b.className = "btn-choice"; b.innerText = choice;
            b.onclick = () => {
                if (idx === totem.correct) {
                    alert("🔓 CONEXÃO ESTABELECIDA! Módulo ativado.");
                    player.tag = totem.id.toUpperCase();
                    closeChallenge();
                } else {
                    alert("❌ Comando inválido!");
                }
            };
            divChoices.appendChild(b);
        });
        challengePopup.style.display = 'block';
    }

    function closeChallenge() {
        challengePopup.style.display = 'none'; activeChallenge = null;
        player.x += (player.x < WORLD_WIDTH/2) ? 70 : -70;
    }

    // --- ENGINE DE RENDER GRÁFICO (CÂMERA) ---
    function drawWorld() {
        camera.x = player.x - canvas.width / 2;
        camera.y = player.y - canvas.height / 2;

        // Fundo Debian
        ctx.fillStyle = "#030208"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        stars.forEach(s => {
            let sx = s.x - camera.x; let sy = s.y - camera.y;
            if(sx >= 0 && sx <= canvas.width && sy >= 0 && sy <= canvas.height) {
                ctx.beginPath(); ctx.arc(sx, sy, s.r, 0, Math.PI*2); ctx.fill();
            }
        });
        
        // Espiral Debian
        ctx.strokeStyle = "rgba(168, 85, 247, 0.12)"; ctx.lineWidth = 6; ctx.beginPath();
        for (let i = 0; i < 180; i++) {
            let angle = 0.15 * i;
            let x = (WORLD_WIDTH / 2) + (15 + 5 * angle) * Math.cos(angle) - camera.x;
            let y = (WORLD_HEIGHT / 2) + (15 + 5 * angle) * Math.sin(angle) - camera.y;
            ctx.lineTo(x, y);
        }
        ctx.stroke();

        const cx = WORLD_WIDTH / 2 - camera.x; 
        const cy = WORLD_HEIGHT / 2 - camera.y;

        // Rodovias cinzas
        ctx.strokeStyle = "#121824"; ctx.lineWidth = 50;
        ctx.beginPath(); ctx.moveTo(WORLD_WIDTH/2 - camera.x, 200 - camera.y); ctx.lineTo(WORLD_WIDTH/2 - camera.x, WORLD_HEIGHT - 200 - camera.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(200 - camera.x, WORLD_HEIGHT/2 - camera.y); ctx.lineTo(WORLD_WIDTH - 200 - camera.x, WORLD_HEIGHT/2 - camera.y); ctx.stroke();

        // LFS (Centro)
        let lfsX = WORLD_WIDTH / 2 - 200 - camera.x;
        let lfsY = WORLD_HEIGHT / 2 - 200 - camera.y;
        ctx.fillStyle = "#0d1117"; ctx.fillRect(lfsX, lfsY, 400, 400);
        ctx.strokeStyle = "#00ff41"; ctx.lineWidth = 2; ctx.strokeRect(lfsX, lfsY, 400, 400);
        
        ctx.fillStyle = "rgba(0, 255, 65, 0.1)"; ctx.font = "10px monospace"; matrixFrame++;
        for(let i=0; i<15; i++) {
            for(let j=0; j<15; j++) {
                ctx.fillText((Math.random() > 0.5 ? "1" : "0"), lfsX + 15 + i*25, lfsY + 25 + j*25 + (matrixFrame % 10));
            }
        }

        // KALI (Sup. Esquerdo)
        let kaliX = 150 - camera.x; let kaliY = 150 - camera.y;
        ctx.fillStyle = "#161920"; ctx.fillRect(kaliX, kaliY, 450, 350);
        ctx.strokeStyle = "#a855f7"; ctx.strokeRect(kaliX, kaliY, 450, 350);

        // ARCH (Sup. Direito)
        let archX = (WORLD_WIDTH - 600) - camera.x; let archY = 150 - camera.y;
        ctx.fillStyle = "#0f172a"; ctx.fillRect(archX, archY, 450, 350);
        ctx.strokeStyle = "#0ea5e9"; ctx.strokeRect(archX, archY, 450, 350);

        // UBUNTU (Inf. Esquerdo)
        let uX = 150 - camera.x; let uY = (WORLD_HEIGHT - 500) - camera.y;
        ctx.fillStyle = "#2d1a10"; ctx.fillRect(uX, uY, 450, 350);
        ctx.strokeStyle = "#ea580c"; ctx.strokeRect(uX, uY, 450, 350);

        // FEDORA (Inf. Direito)
        let fedX = (WORLD_WIDTH - 600) - camera.x; let fedY = (WORLD_HEIGHT - 500) - camera.y;
        ctx.fillStyle = "#1e293b"; ctx.fillRect(fedX, fedY, 450, 350);
        ctx.strokeStyle = "#3b82f6"; ctx.strokeRect(fedX, fedY, 450, 350);

        // TOTENS
        totems.forEach(t => {
            let tx = t.x - camera.x; let ty = t.y - camera.y;
            ctx.fillStyle = t.color; ctx.beginPath(); ctx.arc(tx, ty, 20, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
        });
    }

    // --- RADAR GERAL (M) ---
    function drawTacticalMap() {
        ctx.fillStyle = "rgba(4, 6, 12, 0.98)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#3498db"; ctx.lineWidth = 3; ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

        ctx.fillStyle = "#3498db"; ctx.font = "bold 16px monospace"; ctx.textAlign = "center";
        ctx.fillText("RADAR GLOBAL DE DISTROS", canvas.width / 2, 60);

        const rx = canvas.width / 2; const ry = canvas.height / 2;
        
        ctx.font = "10px monospace";
        ctx.fillStyle = "#0d1117"; ctx.fillRect(rx-30, ry-30, 60, 60); ctx.fillStyle = "#00ff41"; ctx.fillText("LFS", rx, ry+5);
        ctx.fillStyle = "#161920"; ctx.fillRect(rx-140, ry-100, 70, 50); ctx.fillStyle = "#a855f7"; ctx.fillText("KALI", rx-105, ry-70);
        ctx.fillStyle = "#0f172a"; ctx.fillRect(rx+70, ry-100, 70, 50);  ctx.fillStyle = "#0ea5e9"; ctx.fillText("ARCH", rx+105, ry-70);
        ctx.fillStyle = "#2d1a10"; ctx.fillRect(rx-140, ry+50, 70, 50);  ctx.fillStyle = "#ea580c"; ctx.fillText("UBUNTU", rx-105, ry+80);
        ctx.fillStyle = "#1e293b"; ctx.fillRect(rx+70, ry+50, 70, 50);   ctx.fillStyle = "#3b82f6"; ctx.fillText("FEDORA", rx+105, ry+80);

        // Bolinha vermelha do jogador
        let pulse = Math.abs(Math.sin(Date.now() / 120)) * 5;
        ctx.fillStyle = "#ef4444"; ctx.beginPath();
        let ratioX = (player.x / WORLD_WIDTH) * 260 + (rx - 130);
        let ratioY = (player.y / WORLD_HEIGHT) * 200 + (ry - 100);
        ctx.arc(ratioX, ratioY, 5 + pulse, 0, Math.PI * 2); ctx.fill();
    }

    // --- DESENHO DO TUX ---
    function drawPlayer() {
        const x = player.x - camera.x; const y = player.y - camera.y;
        ctx.textAlign = "center";
        
        ctx.fillStyle = "rgba(15, 23, 42, 0.9)"; ctx.fillRect(x - 35, y - 50, 70, 15);
        ctx.strokeStyle = "#3498db"; ctx.strokeRect(x - 35, y - 50, 70, 15);
        ctx.fillStyle = "#fff"; ctx.font = "bold 9px Arial"; ctx.fillText(player.tag.toUpperCase(), x, y - 39);

        ctx.fillStyle = "#fff"; ctx.font = "11px monospace"; ctx.fillText(player.name, x, y + 32);

        ctx.fillStyle = player.color; ctx.beginPath(); ctx.ellipse(x, y, 15, 20, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(x, y+3, 10, 14, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(x-4, y-7, 1.8, 0, 7); ctx.fill(); ctx.beginPath(); ctx.arc(x+4, y-7, 1.8, 0, 7); ctx.fill();
        ctx.fillStyle = "orange"; ctx.fillRect(x-3, y-3, 6, 4);
    }

    // --- GAME LOOP ---
    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (isMapOpen) {
            drawTacticalMap();
        } else {
            // Movimentação por teclado (PC)
            if (!activeChallenge && !joystickActive) {
                if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
                if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
                if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
                if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
            }
            
            // Movimentação por Joystick (Mobile)
            if (!activeChallenge && joystickActive) {
                player.x += joystickVector.x * player.speed;
                player.y += joystickVector.y * player.speed;
            }

            // Colisão com as bordas do mapa 3000px
            if (player.x < 25) player.x = 25; if (player.x > WORLD_WIDTH - 25) player.x = WORLD_WIDTH - 25;
            if (player.y < 25) player.y = 25; if (player.y > WORLD_HEIGHT - 25) player.y = WORLD_HEIGHT - 25;

            // Sensores de proximidade dos totens
            if (!activeChallenge) {
                totems.forEach(t => {
                    let distance = Math.sqrt((player.x - t.x)**2 + (player.y - t.y)**2);
                    if (distance < 40) openChallenge(t);
                });
            }

            drawWorld();
            drawPlayer();
        }
        requestAnimationFrame(loop);
    }

    function gameLoop() { loop(); }
    window.onresize = () => { resize(); };
</script>
</body>
</html>
