<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tux Town - Beta Edition</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --terminal-bg: #0d1117;
            --ui-blue: #3498db;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100%;
        }

        /* --- TELAS --- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }

        .menu-card {
            background: rgba(30, 30, 30, 0.9);
            padding: 30px; border-radius: 15px;
            border: 2px solid var(--matrix-green);
            box-shadow: 0 0 20px var(--matrix-green);
            width: 350px; text-align: center;
        }

        #game-view { display: none; position: relative; width: 100vw; height: 100vh; }

        /* --- UI OVERLAYS --- */
        .btn-ui {
            position: absolute; background: rgba(0,0,0,0.8);
            border: 1px solid var(--ui-blue); color: var(--ui-blue);
            padding: 10px 15px; cursor: pointer; border-radius: 5px;
            font-weight: bold; transition: 0.3s; z-index: 10;
        }
        .btn-ui:hover { background: var(--ui-blue); color: #fff; }

        #map-btn { bottom: 20px; left: 20px; }
        #options-btn { top: 20px; right: 20px; }

        #options-menu {
            position: absolute; top: 70px; right: 20px;
            background: rgba(0,0,0,0.9); border: 1px solid #444;
            display: none; flex-direction: column; padding: 10px; border-radius: 5px;
            z-index: 10;
        }

        /* --- POPUP DE DESAFIOS (QUESTIONS) --- */
        #challenge-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; border: 2px solid var(--matrix-green);
            box-shadow: 0 0 20px var(--matrix-green);
            padding: 20px; border-radius: 10px; display: none;
            width: 400px; text-align: center; z-index: 40;
        }

        /* --- INPUTS --- */
        input, select, button {
            width: 100%; padding: 10px; margin: 10px 0;
            border-radius: 5px; border: 1px solid #444;
            background: #222; color: #fff; box-sizing: border-box;
        }
        #btn-enter { background: var(--matrix-green); color: #000; font-weight: bold; cursor: pointer; border: none; }
        .btn-choice { background: #111; border: 1px solid var(--ui-blue); text-align: left; cursor: pointer; }
        .btn-choice:hover { background: var(--ui-blue); }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="color: var(--matrix-green); font-size: 3em; margin-bottom: 10px;">TUX TOWN</h1>
    <div class="menu-card">
        <h3>CUSTOMIZE SEU TUX</h3>
        <input type="text" id="p-name" placeholder="Nome do seu Tux..." maxlength="12" value="Tuxer">
        
        <label>Cor do Corpo:</label>
        <input type="color" id="p-color-body" value="#1793d1">
        
        <label>Tag da Distro:</label>
        <select id="p-tag">
            <option value="LFS">LFS (Linux From Scratch)</option>
            <option value="Arch">Arch Linux</option>
            <option value="Kali">Kali Linux</option>
            <option value="Fedora">Fedora</option>
            <option value="Ubuntu">Ubuntu</option>
        </select>
        
        <button id="btn-enter">ENTRAR NO SERVER</button>
    </div>
</div>

<div id="game-view">
    <canvas id="gameCanvas"></canvas>
    
    <div id="map-btn" class="btn-ui">MAPA (M)</div>
    <div id="options-btn" class="btn-ui">OPÇÕES ⚙️</div>
    
    <div id="options-menu">
        <button onclick="location.reload()">Sair do Server</button>
        <button onclick="alert('Configurações: Use WASD/Setas para andar e M para o Mapa!')">Controles</button>
    </div>

    <div id="challenge-popup">
        <h3 id="challenge-title" style="color: var(--matrix-green); margin-top: 0;">DESAFIO TERMINAL</h3>
        <p id="challenge-text">Pergunta...</p>
        <div id="challenge-choices"></div>
        <button onclick="closeChallenge()" style="background: #cc0000; margin-top: 15px; border: none; font-weight: bold; cursor: pointer;">FECHAR</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();

    // --- ESTADO DO JOGO ---
    let player = {
        x: 0, y: 0, 
        name: "Tux", color: "#333", 
        tag: "LFS", speed: 6
    };
    
    let isMapOpen = false;
    let activeChallenge = null;
    let matrixFrame = 0;

    // --- CONFIGURAÇÃO DOS DESAFIOS (QUESTIONS) ---
    const terminals = [
        {
            id: "kali-term", name: "Terminal Kali", zone: "Kali",
            x: 200, y: 200, radius: 25, color: "#58a6ff",
            question: "Qual comando é usado no terminal para testar a conectividade de rede enviando pacotes para um servidor?",
            choices: ["a) ping", "b) cd", "c) mkdir", "d) rm"],
            correct: 0
        },
        {
            id: "arch-term", name: "Terminal Arch", zone: "Arch",
            x: window.innerWidth - 200, y: window.innerHeight - 200, radius: 25, color: "#1793d1",
            question: "No Arch Linux, qual é o gerenciador de pacotes padrão usado para instalar programas via terminal?",
            choices: ["a) apt", "b) pacman", "c) dnf", "d) yum"],
            correct: 1
        }
    ];

    // --- ELEMENTOS UI ---
    const startScreen = document.getElementById('start-screen');
    const gameView = document.getElementById('game-view');
    const btnEnter = document.getElementById('btn-enter');
    const optionsBtn = document.getElementById('options-btn');
    const optionsMenu = document.getElementById('options-menu');
    const mapBtn = document.getElementById('map-btn');
    const challengePopup = document.getElementById('challenge-popup');

    // --- LÓGICA DE INÍCIO ---
    btnEnter.onclick = () => {
        player.name = document.getElementById('p-name').value || "Tuxer";
        player.color = document.getElementById('p-color-body').value;
        player.tag = document.getElementById('p-tag').value;
        
        startScreen.style.display = 'none';
        gameView.style.display = 'block';
        
        // Centraliza o jogador no Lobby do LFS
        player.x = canvas.width / 2;
        player.y = canvas.height / 2;
        
        // Atualiza dinamicamente as posições dos terminais baseadas no tamanho atual da tela
        terminals[1].x = canvas.width - 200;
        terminals[1].y = canvas.height - 200;
        
        gameLoop();
    };

    optionsBtn.onclick = () => {
        optionsMenu.style.display = optionsMenu.style.display === 'flex' ? 'none' : 'flex';
    };

    mapBtn.onclick = () => { toggleMap(); };

    // --- CONTROLES ---
    const keys = {};
    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.code === 'KeyM') toggleMap();
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function toggleMap() {
        if (activeChallenge) return; // Não abre mapa durante pergunta
        isMapOpen = !isMapOpen;
    }

    function openChallenge(term) {
        if (activeChallenge === term) return;
        activeChallenge = term;
        
        document.getElementById('challenge-title').innerText = `DESAFIO: ${term.name.toUpperCase()}`;
        document.getElementById('challenge-text').innerText = term.question;
        
        const choicesDiv = document.getElementById('challenge-choices');
        choicesDiv.innerHTML = "";
        
        term.choices.forEach((choice, index) => {
            const btn = document.createElement('button');
            btn.className = "btn-choice";
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(index, term.correct);
            choicesDiv.appendChild(btn);
        });
        
        challengePopup.style.display = 'block';
    }

    function checkAnswer(selected, correct) {
        if (selected === correct) {
            alert("💻 ACERTOU! Acesso concedido ao módulo da distro.");
            closeChallenge();
        } else {
            alert("❌ Resposta incorreta. Tente novamente no terminal!");
        }
    }

    function closeChallenge() {
        challengePopup.style.display = 'none';
        activeChallenge = null;
        // Empurra o jogador um pouco para trás para sair do raio de colisão imediato
        player.x += 40;
    }

    // --- VERIFICAÇÃO DE COLISÃO COM OS TERMINAIS ---
    function checkCollisions() {
        if (activeChallenge || isMapOpen) return;

        terminals.forEach(term => {
            const dx = player.x - term.x;
            const dy = player.y - term.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // Se o jogador chegar perto do terminal, abre a pergunta
            if (distance < term.radius + 20) {
                openChallenge(term);
            }
        });
    }

    // --- DESENHO DO MAPA DE JOGO (ILHAS) ---
    function drawMap() {
        ctx.fillStyle = "#050505";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        // Desenhar Pontes de Conexão
        ctx.strokeStyle = "#222222"; ctx.lineWidth = 30;
        ctx.beginPath(); ctx.moveTo(cx, 100); ctx.lineTo(cx, canvas.height - 100); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(100, cy); ctx.lineTo(canvas.width - 100, cy); ctx.stroke();

        // 1. ILHA CENTRAL (LOBBY LFS) - Estilo Matrix
        ctx.fillStyle = "#0d1117"; ctx.fillRect(cx - 150, cy - 150, 300, 300);
        ctx.strokeStyle = varColor('--matrix-green'); ctx.lineWidth = 2; ctx.strokeRect(cx - 150, cy - 150, 300, 300);

        // Efeito Cascata de Código no Fundo
        ctx.fillStyle = "rgba(0, 255, 65, 0.08)"; ctx.font = "10px monospace";
        matrixFrame++;
        for(let i=0; i<14; i++) {
            for(let j=0; j<14; j++) {
                let char = (Math.random() > 0.6) ? "1" : "0";
                ctx.fillText(char, (cx - 140) + i*21, (cy - 135) + j*21 + (matrixFrame % 15));
            }
        }
        ctx.fillStyle = varColor('--matrix-green');
        ctx.font = "12px 'Courier New'";
        ctx.fillText("LOBBY LFS - TERMINAL", cx - 75, cy - 120);

        // 2. ILHA KALI (Superior Esquerda)
        ctx.fillStyle = "#1c252e"; ctx.fillRect(100, 100, 200, 200);
        ctx.strokeStyle = "#58a6ff"; ctx.strokeRect(100, 100, 200, 200);
        ctx.fillStyle = "#58a6ff"; ctx.fillText("ZONA KALI LINUX", 120, 130);

        // 3. ILHA ARCH (Inferior Direita)
        ctx.fillStyle = "#0f2535"; ctx.fillRect(canvas.width - 300, canvas.height - 300, 200, 200);
        ctx.strokeStyle = "#1793d1"; ctx.strokeRect(canvas.width - 300, canvas.height - 300, 200, 200);
        ctx.fillStyle = "#1793d1"; ctx.fillText("ARCH TERRITORY", canvas.width - 280, canvas.height - 270);

        // DESENHAR OS TERMINAIS INTERATIVOS (QUESTIONS)
        terminals.forEach(term => {
            ctx.fillStyle = term.color;
            ctx.beginPath(); ctx.arc(term.x, term.y, term.radius, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();
            
            // Texto indicativo em cima do terminal
            ctx.fillStyle = "#fff"; ctx.font = "10px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("💻 DESAFIO", term.x, term.y - term.radius - 5);
        });
    }

    // --- MÓDULO EXCLUSIVO: VISÃO GERAL DO MAPA TÁTICO (TECLA M) ---
    function drawTacticalMap() {
        // Fundo escuro do mapa tático
        ctx.fillStyle = "rgba(10, 15, 24, 0.95)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Moldura do Mapa
        ctx.strokeStyle = varColor('--ui-blue'); ctx.lineWidth = 4;
        ctx.strokeRect(50, 50, canvas.width - 100, canvas.height - 100);

        ctx.fillStyle = varColor('--ui-blue');
        ctx.font = "bold 24px 'Courier New'"; ctx.textAlign = "center";
        ctx.fillText("SISTEMA DE MAPEAMENTO DE DISTROS - TUX TOWN", canvas.width / 2, 90);

        // Renderiza uma versão isométrica/minificada no centro
        const mx = canvas.width / 2;
        const my = canvas.height / 2;

        // Representação das Ilhas no Mapa Tático
        ctx.lineWidth = 2;
        // LFS Central
        ctx.fillStyle = "#0d1117"; ctx.strokeStyle = varColor('--matrix-green');
        ctx.fillRect(mx - 60, my - 60, 120, 120); ctx.strokeRect(mx - 60, my - 60, 120, 120);
        ctx.fillStyle = "#00ff41"; ctx.font = "12px sans-serif"; ctx.fillText("LOBBY (LFS)", mx, my + 5);

        // Kali
        ctx.fillStyle = "#1c252e"; ctx.strokeStyle = "#58a6ff";
        ctx.fillRect(mx - 220, my - 160, 100, 100); ctx.strokeRect(mx - 220, my - 160, 100, 100);
        ctx.fillStyle = "#58a6ff"; ctx.fillText("ZONA KALI", mx - 170, my - 105);

        // Arch
        ctx.fillStyle = "#0f2535"; ctx.strokeStyle = "#1793d1";
        ctx.fillRect(mx + 120, my + 60, 100, 100); ctx.strokeRect(mx + 120, my + 60, 100, 100);
        ctx.fillStyle = "#1793d1"; ctx.fillText("ARCH LINUX", mx + 170, my + 115);

        // Ponto piscante do Jogador Real no Mapa
        let pulse = Math.abs(Math.sin(Date.now() / 200)) * 8;
        ctx.fillStyle = "#ff3333";
        ctx.beginPath();
        // Mapeia a posição do jogador para a escala do minimapa
        let pMiniX = mx + (player.x - canvas.width/2) * 0.4;
        let pMiniY = my + (player.y - canvas.height/2) * 0.4;
        ctx.arc(pMiniX, pMiniY, 6 + pulse, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ff3333"; ctx.font = "bold 11px sans-serif";
        ctx.fillText("VOCÊ", pMiniX, pMiniY - 15);

        ctx.fillStyle = "#888"; ctx.font = "14px monospace";
        ctx.fillText("[ Pressione 'M' ou clique no botão para retornar ao jogo ]", canvas.width / 2, canvas.height - 80);
    }

    // --- DESENHO DO TUX ---
    function drawPlayer() {
        const x = player.x, y = player.y;
        ctx.textAlign = "center";
        
        // Tag da Distro (Aparência de Tag/Badge)
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(x - 35, y - 55, 70, 16);
        ctx.strokeStyle = varColor('--ui-blue'); ctx.lineWidth = 1;
        ctx.strokeRect(x - 35, y - 55, 70, 16);
        ctx.fillStyle = "#fff"; ctx.font = "bold 9px Arial";
        ctx.fillText(player.tag, x, y - 43);

        // Nome do Jogador
        ctx.fillStyle = "#fff"; ctx.font = "12px monospace";
        ctx.fillText(player.name, x, y + 35);

        // Corpo Base (Pinguim)
        ctx.fillStyle = player.color;
        ctx.beginPath(); ctx.ellipse(x, y, 18, 24, 0, 0, Math.PI*2); ctx.fill();
        
        // Barriga branca
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.ellipse(x, y + 4, 11, 16, 0, 0, Math.PI*2); ctx.fill();
        
        // Olhos e Bico
        ctx.fillStyle = "#000"; 
        ctx.beginPath(); ctx.arc(x - 5, y - 10, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 5, y - 10, 2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "orange"; ctx.fillRect(x - 4, y - 5, 8, 5);
    }

    // --- SISTEMA DE MOVIMENTAÇÃO ---
    function updateMovement() {
        if (isMapOpen || activeChallenge) return;

        if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
        if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
        if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
        if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;

        // Limites da Janela (não deixa o pinguim fugir da tela)
        if (player.x < 20) player.x = 20;
        if (player.x > canvas.width - 20) player.x = canvas.width - 20;
        if (player.y < 20) player.y = 20;
        if (player.y > canvas.height - 20) player.y = canvas.height - 20;
    }

    // --- GAME LOOP PRINCIPAL ---
    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (isMapOpen) {
            drawTacticalMap();
        } else {
            updateMovement();
            checkCollisions();
            drawMap();
            drawPlayer();
        }
        
        requestAnimationFrame(gameLoop);
    }

    // Auxiliar para pegar cores do CSS root
    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    // Reajuste de tela automático
    window.onresize = () => {
        resizeCanvas();
        if(terminals[1]) {
            terminals[1].x = canvas.width - 200;
            terminals[1].y = canvas.height - 200;
        }
    };
</script>
</body>
</html>
