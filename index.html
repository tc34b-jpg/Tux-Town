<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tux Town - Beta Edition</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --terminal-bg: #0d1117;
            --ui-blue: #3498db;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100%;
        }

        /* --- TELAS --- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }

        .menu-card {
            background: rgba(30, 30, 30, 0.9);
            padding: 30px; border-radius: 15px;
            border: 2px solid var(--matrix-green);
            box-shadow: 0 0 20px var(--matrix-green);
            width: 350px; text-align: center;
        }

        #game-view { display: none; position: relative; }

        /* --- UI OVERLAYS --- */
        .btn-ui {
            position: absolute; background: rgba(0,0,0,0.8);
            border: 1px solid var(--ui-blue); color: var(--ui-blue);
            padding: 10px 15px; cursor: pointer; border-radius: 5px;
            font-weight: bold; transition: 0.3s;
        }
        .btn-ui:hover { background: var(--ui-blue); color: #fff; }

        #map-btn { bottom: 20px; left: 20px; }
        #options-btn { top: 20px; right: 20px; }

        #options-menu {
            position: absolute; top: 70px; right: 20px;
            background: rgba(0,0,0,0.9); border: 1px solid #444;
            display: none; flex-direction: column; padding: 10px; border-radius: 5px;
        }

        /* --- INPUTS --- */
        input, select, button {
            width: 100%; padding: 10px; margin: 10px 0;
            border-radius: 5px; border: 1px solid #444;
            background: #222; color: #fff;
        }
        #btn-enter { background: var(--matrix-green); color: #000; font-weight: bold; cursor: pointer; border: none; }

        #map-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 50;
        }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="color: var(--matrix-green); font-size: 3em; margin-bottom: 10px;">TUX TOWN</h1>
    <div class="menu-card">
        <h3>CUSTOMIZE SEU TUX</h3>
        <input type="text" id="p-name" placeholder="Nome do seu Tux..." maxlength="12">
        
        <label>Cor do Corpo:</label>
        <input type="color" id="p-color-body" value="#333333">
        
        <label>Tag da Distro:</label>
        <select id="p-tag">
            <option value="LFS">LFS (Linux From Scratch)</option>
            <option value="Arch">Arch Linux</option>
            <option value="Kali">Kali Linux</option>
            <option value="Fedora">Fedora</option>
            <option value="Ubuntu">Ubuntu</option>
        </select>
        
        <button id="btn-enter">ENTRAR NO SERVER</button>
    </div>
</div>

<div id="game-view">
    <canvas id="gameCanvas"></canvas>
    
    <div id="map-btn" class="btn-ui">MAPA (M)</div>
    <div id="options-btn" class="btn-ui">OPÇÕES ⚙️</div>
    
    <div id="options-menu">
        <button onclick="location.reload()">Sair do Server</button>
        <button onclick="alert('Configurações em breve!')">Configurações</button>
        <button onclick="alert('Volte ao início para mudar!')">Customização</button>
    </div>
</div>

<div id="map-overlay">
    <div style="text-align: center;">
        <h2 style="color: var(--ui-blue);">VISÃO DO MAPA</h2>
        <img id="mini-map-preview" style="border: 2px solid var(--ui-blue); background: #111; width: 400px; height: 300px;">
        <p>[Pressione M para fechar]</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // --- ESTADO DO JOGO ---
    let player = {
        x: 0, y: 0, 
        name: "Tux", color: "#333", 
        tag: "LFS", speed: 5
    };
    
    let isMapOpen = false;
    let matrixFrame = 0;

    // --- ELEMENTOS UI ---
    const startScreen = document.getElementById('start-screen');
    const gameView = document.getElementById('game-view');
    const btnEnter = document.getElementById('btn-enter');
    const optionsBtn = document.getElementById('options-btn');
    const optionsMenu = document.getElementById('options-menu');
    const mapOverlay = document.getElementById('map-overlay');

    // --- LÓGICA DE INÍCIO ---
    btnEnter.onclick = () => {
        player.name = document.getElementById('p-name').value || "Tuxer";
        player.color = document.getElementById('p-color-body').value;
        player.tag = document.getElementById('p-tag').value;
        
        startScreen.style.display = 'none';
        gameView.style.display = 'block';
        
        // Posiciona no centro da ilha LFS
        player.x = canvas.width / 2;
        player.y = canvas.height / 2;
        
        gameLoop();
    };

    optionsBtn.onclick = () => {
        optionsMenu.style.display = optionsMenu.style.display === 'flex' ? 'none' : 'flex';
    };

    // --- INPUTS ---
    const keys = {};
    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.code === 'KeyM') toggleMap();
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function toggleMap() {
        isMapOpen = !isMapOpen;
        mapOverlay.style.display = isMapOpen ? 'flex' : 'none';
    }

    // --- DESENHO DO MAPA (ILHAS) ---
    function drawMap() {
        // "Vazio digital"
        ctx.fillStyle = "#050505";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Pontes
        ctx.strokeStyle = "#333"; ctx.lineWidth = 40;
        ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();

        // ILHA CENTRAL (LFS) - Matrix Style
        const cx = canvas.width/2, cy = canvas.height/2;
        ctx.fillStyle = "#0d1117";
        ctx.fillRect(cx - 150, cy - 150, 300, 300);
        ctx.strokeStyle = "#00ff41"; ctx.lineWidth = 2;
        ctx.strokeRect(cx - 150, cy - 150, 300, 300);

        // EFEITO MATRIX NO CHÃO
        ctx.fillStyle = "rgba(0, 255, 65, 0.15)";
        ctx.font = "10px monospace";
        matrixFrame++;
        for(let i=0; i<15; i++) {
            for(let j=0; j<15; j++) {
                let char = (Math.random() > 0.5) ? "1" : "0";
                ctx.fillText(char, (cx - 140) + i*20, (cy - 140) + j*20 + (matrixFrame % 20));
            }
        }
        ctx.fillStyle = "#00ff41"; ctx.fillText("LOBBY LFS - TERMINAL", cx - 70, cy - 130);

        // ILHA KALI (Superior Esquerda)
        ctx.fillStyle = "#2a394a"; ctx.fillRect(100, 100, 200, 200);
        ctx.fillStyle = "#58a6ff"; ctx.fillText("ZONA KALI", 150, 120);

        // ILHA ARCH (Inferior Direita)
        ctx.fillStyle = "#1793d1"; ctx.fillRect(canvas.width - 300, canvas.height - 300, 200, 200);
        ctx.fillStyle = "#fff"; ctx.fillText("ARCH TERRITORY", canvas.width - 250, canvas.height - 280);
    }

    // --- DESENHO DO TUX COM TAG ---
    function drawPlayer() {
        const x = player.x, y = player.y;
        
        // Tag da Distro
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(x - 30, y - 55, 60, 15);
        ctx.strokeStyle = "#3498db"; ctx.strokeRect(x - 30, y - 55, 60, 15);
        ctx.fillStyle = "#fff"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
        ctx.fillText(player.tag, x, y - 44);

        // Nome
        ctx.fillStyle = "#fff"; ctx.fillText(player.name, x, y + 35);

        // Corpo Pinguim
        ctx.fillStyle = player.color;
        ctx.beginPath(); ctx.ellipse(x, y, 20, 25, 0, 0, Math.PI*2); ctx.fill();
        // Barriga
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.ellipse(x, y+5, 12, 18, 0, 0, Math.PI*2); ctx.fill();
        // Olhos e Bico (Simplificado)
        ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(x-5, y-10, 2, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(x+5, y-10, 2, 0, 7); ctx.fill();
        ctx.fillStyle = "orange"; ctx.fillRect(x-4, y-5, 8, 5);
    }

    function update() {
        if (isMapOpen) return;
        if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
        if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
        if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
        if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        update();
        drawMap();
        drawPlayer();
        requestAnimationFrame(gameLoop);
    }

    // Redimensionar tela
    window.onresize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    };
</script>
</body>
</html>
